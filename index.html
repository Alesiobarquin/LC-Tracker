<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LC Tracker — LeetCode Progress Tracker &amp; Spaced Repetition Review</title>
    <meta name="description" content="LC Tracker helps you track your LeetCode problem-solving progress, review solved problems with spaced repetition, and prepare for technical coding interviews." />
  </head>
  <body>
    <div id="root"></div>
    <!--
      Static content for crawlers that do not execute JavaScript.
      Hidden once React mounts via the app's own styles on #root.
    -->
    <noscript>
      <div style="font-family:sans-serif;max-width:600px;margin:40px auto;padding:0 20px;color:#333">
        <h1>LC Tracker</h1>
        <p>LC Tracker is a web application that helps you track your LeetCode problem-solving progress, review solved problems using spaced repetition, and prepare for technical coding interviews.</p>
        <p><a href="/login">Sign In</a> · <a href="/privacy">Privacy Policy</a> · <a href="/terms">Terms of Service</a></p>
      </div>
    </noscript>
    <div id="seo-footer" style="position:absolute;left:0;bottom:0;width:100%;text-align:center;padding:16px;font-family:sans-serif;font-size:12px">
      <a href="/privacy" style="color:#888;margin-right:12px">Privacy Policy</a>
      <a href="/terms" style="color:#888">Terms of Service</a>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide the static SEO footer once React renders
      document.addEventListener('DOMContentLoaded', function() {
        var el = document.getElementById('seo-footer');
        if (el) el.style.display = 'none';
      });
    </script>
  </body>
</html>
